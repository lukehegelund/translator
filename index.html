<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Translator</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6c8aff;
      --accent2: #a78bfa;
      --success: #34d399;
      --text: #f0f2ff;
      --muted: #6b7280;
      --pill-active: #6c8aff;
      --pill-bg: #1a1d27;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      opacity: 0.9;
    }

    .save-indicator {
      font-size: 0.72rem;
      color: var(--success);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .save-indicator.show { opacity: 1; }
    .save-dot {
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
    }

    /* ── Language selector ──────────────────────────── */
    .lang-section {
      padding: 20px 20px 0;
    }

    .lang-pills {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lang-group {
      display: flex;
      background: var(--surface);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
      flex: 1;
      border: 1px solid var(--border);
    }

    .lang-pill {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 9px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
      color: var(--muted);
      text-align: center;
    }

    .lang-pill.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 12px rgba(108,138,255,0.4);
    }

    .swap-btn {
      width: 40px; height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--accent);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .swap-btn:active {
      transform: scale(0.92);
      background: var(--surface2);
    }

    /* Direction label */
    .direction-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 14px;
      letter-spacing: 0.01em;
    }

    .direction-label .arrow { color: var(--accent); font-size: 1rem; }

    /* ── Main card ──────────────────────────────────── */
    .card {
      margin: 16px 20px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }

    .input-area {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1.05rem;
      line-height: 1.5;
      resize: none;
      min-height: 72px;
      font-family: inherit;
    }

    textarea::placeholder { color: var(--muted); }

    .input-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .char-count {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .clear-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .clear-btn:active { background: var(--border); }

    /* Result area */
    .result-area {
      padding: 16px;
      min-height: 80px;
      position: relative;
    }

    /* Delete last translation button */
    .delete-btn {
      background: none;
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 7px;
      transition: all 0.2s;
      display: none;
    }
    .delete-btn.visible { display: inline-block; }
    .delete-btn:active { background: rgba(248,113,113,0.15); }

    .result-text {
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--accent2);
      font-weight: 500;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-placeholder {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .result-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .status-badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status-badge.show { opacity: 1; }
    .status-badge.translating { background: rgba(108,138,255,0.15); color: var(--accent); }
    .status-badge.saved { background: rgba(52,211,153,0.15); color: var(--success); }
    .status-badge.error { background: rgba(239,68,68,0.15); color: #f87171; }

    .speak-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 11px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      display: none; /* hidden until there's a translation */
    }
    .speak-btn.visible { display: inline-block; }
    .speak-btn.speaking {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(108,138,255,0.12);
      animation: pulse-speak 1s infinite;
    }
    @keyframes pulse-speak {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .copy-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:active { color: var(--text); }

    /* ── Translate button ───────────────────────────── */
    .translate-btn {
      margin: 10px 20px 0;
      width: calc(100% - 40px);
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(108,138,255,0.3);
    }

    .translate-btn:active { transform: scale(0.98); opacity: 0.9; }
    .translate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── History ────────────────────────────────────── */
    .history-section {
      margin: 20px 20px 0;
      padding-bottom: 30px;
    }

    .history-header {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .history-item:active { border-color: var(--accent); }

    .history-original {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .history-translated {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .history-meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-tag {
      background: rgba(108,138,255,0.15);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 600;
    }

    .empty-history {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 20px 0;
    }

    /* ── Webhook config (hidden, settings) ─────────── */
    .settings-section {
      margin: 0 20px 0;
    }

    details summary {
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    details summary::before { content: '⚙'; }

    .settings-inner {
      margin-top: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .settings-inner label {
      font-size: 0.72rem;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .settings-inner input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }

    .settings-inner input:focus { border-color: var(--accent); }

    .save-webhook-btn {
      margin-top: 8px;
      padding: 8px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 20px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Translator</h1>
    <div class="save-indicator" id="saveIndicator">
      <div class="save-dot"></div>
      Saved
    </div>
  </div>

  <!-- Language selector -->
  <div class="lang-section">
    <div class="lang-pills">
      <div class="lang-group" id="langGroup">
        <button class="lang-pill active" data-lang="es" onclick="selectLang('es')">Spanish</button>
        <button class="lang-pill" data-lang="da" onclick="selectLang('da')">Danish</button>
      </div>
      <button class="swap-btn" onclick="toggleDirection()" title="Swap direction">⇄</button>
    </div>
    <div class="direction-label">
      <span id="fromLabel">English</span>
      <span class="arrow">→</span>
      <span id="toLabel">Spanish</span>
    </div>
  </div>

  <!-- Main card -->
  <div class="card">
    <div class="input-area">
      <textarea id="inputText" placeholder="Type to translate..." oninput="updateCharCount()" onkeydown="handleKey(event)" rows="4"></textarea>
      <div class="input-actions">
        <span class="char-count" id="charCount">0 chars</span>
        <button class="clear-btn" onclick="clearAll()">Clear</button>
      </div>
    </div>
    <div class="result-area">
      <div id="resultContent" class="result-placeholder">Translation appears here</div>
      <div class="result-actions">
        <span class="status-badge" id="statusBadge"></span>
        <button class="delete-btn" id="deleteBtn" onclick="deleteLastTranslation()" title="Undo save">✕ Delete</button>
        <button class="speak-btn" id="speakBtn" onclick="speakResult()" title="Read aloud">🔊</button>
        <button class="copy-btn" onclick="copyResult()">Copy</button>
      </div>
    </div>
  </div>

  <!-- Translate button -->
  <button class="translate-btn" id="translateBtn" onclick="doTranslate()">Translate</button>

  <div class="divider"></div>

  <!-- Settings -->
  <div class="settings-section">
    <details>
      <summary>Sheet settings</summary>
      <div class="settings-inner">
        <label>Apps Script Webhook URL</label>
        <input type="url" id="webhookInput" placeholder="https://script.google.com/macros/s/..." />
        <button class="save-webhook-btn" onclick="saveWebhook()">Save</button>
      </div>
    </details>
  </div>

  <div class="divider"></div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">Recent</div>
    <div id="historyList"></div>
  </div>

  <script>
    // ── State ─────────────────────────────────────────────────
    let currentTranslation = null;
    let lastSavedEntry = null; // tracks last entry sent to sheet for undo/delete
    let currentLang = 'es'; // es or da
    let directionEnglishFirst = true; // true = EN→target, false = target→EN
    let txHistory = JSON.parse(localStorage.getItem('txHistory2') || '[]');

    const langConfig = {
      es: { code: 'es', name: 'Spanish', tab: 'Spanish' },
      da: { code: 'da', name: 'Danish',  tab: 'Danish'  }
    };

    // ── Init ──────────────────────────────────────────────────
    const DEFAULT_WEBHOOK = 'https://script.google.com/macros/s/AKfycby4o-w87Yu3SMTmD7i-eT39d1BUpJIkebXbPSivGOLx7bFFiwgoGHTNS2wZWxzsyxPljw/exec';

    window.onload = () => {
      const saved = localStorage.getItem('currentLang');
      if (saved && langConfig[saved]) currentLang = saved;
      const savedDir = localStorage.getItem('directionEnglishFirst');
      if (savedDir !== null) directionEnglishFirst = savedDir === 'true';
      // Pre-populate webhook input (use srsWebhookUrl key, shared with flashcard app)
      const webhook = localStorage.getItem('srsWebhookUrl') || DEFAULT_WEBHOOK;
      document.getElementById('webhookInput').value = webhook;
      updateUI();
      renderHistory();
    };

    // ── Language selection ────────────────────────────────────
    function selectLang(lang) {
      currentLang = lang;
      localStorage.setItem('currentLang', lang);
      updateUI();
      clearResult();
    }

    function toggleDirection() {
      directionEnglishFirst = !directionEnglishFirst;
      localStorage.setItem('directionEnglishFirst', directionEnglishFirst);
      // Swap input/output if there's a translation
      if (currentTranslation) {
        document.getElementById('inputText').value = currentTranslation;
        updateCharCount();
        clearResult();
      }
      updateUI();
    }

    function updateUI() {
      // Update pills
      document.querySelectorAll('.lang-pill').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
      // Update direction label
      const langName = langConfig[currentLang].name;
      document.getElementById('fromLabel').textContent = directionEnglishFirst ? 'English' : langName;
      document.getElementById('toLabel').textContent = directionEnglishFirst ? langName : 'English';
    }

    // ── Input helpers ─────────────────────────────────────────
    function updateCharCount() {
      const len = document.getElementById('inputText').value.length;
      document.getElementById('charCount').textContent = len + ' chars';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) doTranslate();
    }

    // ── Translate ─────────────────────────────────────────────
    async function doTranslate() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) return;

      const cfg = langConfig[currentLang];
      const from = directionEnglishFirst ? 'en' : cfg.code;
      const to   = directionEnglishFirst ? cfg.code : 'en';

      setStatus('Translating…', 'translating');
      setResult(null);
      document.getElementById('translateBtn').disabled = true;

      try {
        const url = 'https://api.mymemory.translated.net/get?q='
          + encodeURIComponent(text)
          + '&langpair=' + from + '|' + to
          + '&de=lukehegelund@gmail.com';
        const data = await (await fetch(url)).json();

        if (data.responseStatus === 200) {
          currentTranslation = data.responseData.translatedText;
          setResult(currentTranslation);
          setStatus('', '');
          // Auto-speak the translation
          const toCode = directionEnglishFirst ? cfg.code : 'en';
          speak(currentTranslation, TTS_LOCALE[toCode] || toCode);
          // Auto-save
          autoSave(text, currentTranslation, cfg);
        } else {
          setStatus('Failed — try again', 'error');
        }
      } catch(err) {
        setStatus('Network error', 'error');
      }
      document.getElementById('translateBtn').disabled = false;
    }

    // ── Auto-save ─────────────────────────────────────────────
    async function autoSave(original, translated, cfg) {
      const now = new Date().toLocaleString();
      // Always save to English→target form for the sheet
      const englishText = directionEnglishFirst ? original : translated;
      const targetText  = directionEnglishFirst ? translated : original;

      const entry = {
        action: 'save_translation',
        original: englishText,
        translated: targetText,
        language: cfg.tab,
        time: now,
        langCode: cfg.code
      };

      // Save to local history
      txHistory.unshift({ original, translated, langName: cfg.name, time: now, dirEnFirst: directionEnglishFirst });
      if (txHistory.length > 50) txHistory = txHistory.slice(0, 50);
      localStorage.setItem('txHistory2', JSON.stringify(txHistory));
      renderHistory();

      // Post to webhook
      const webhookUrl = localStorage.getItem('srsWebhookUrl') || DEFAULT_WEBHOOK;

      try {
        const resp = await fetch(webhookUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(entry)
        });
        if (resp.ok) {
          showSaveIndicator();
          lastSavedEntry = entry; // store for potential undo
          document.getElementById('deleteBtn').classList.add('visible');
        }
      } catch(e) {
        // Silent fail — still saved locally
      }
    }

    // ── Delete last translation ───────────────────────────────────────────────
    async function deleteLastTranslation() {
      if (!lastSavedEntry) return;
      const entry = lastSavedEntry;
      lastSavedEntry = null;
      document.getElementById('deleteBtn').classList.remove('visible');

      const webhookUrl = localStorage.getItem('srsWebhookUrl') || DEFAULT_WEBHOOK;
      try {
        await fetch(webhookUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: 'delete_translation',
            original: entry.original,
            translated: entry.translated,
            language: entry.language
          })
        });
      } catch(e) { /* silent */ }

      // Also remove from local history
      txHistory = txHistory.filter((h, i) => i !== 0);
      localStorage.setItem('txHistory2', JSON.stringify(txHistory));
      renderHistory();
      setStatus('Deleted', 'error');
      setTimeout(() => setStatus('', ''), 2000);
    }

    function showSaveIndicator() {
      const el = document.getElementById('saveIndicator');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ── Copy ──────────────────────────────────────────────────
    function copyResult() {
      if (!currentTranslation) return;
      navigator.clipboard.writeText(currentTranslation).then(() => {
        setStatus('Copied!', 'saved');
        setTimeout(() => setStatus('', ''), 2000);
      });
    }

    // ── Clear ─────────────────────────────────────────────────
    function clearAll() {
      document.getElementById('inputText').value = '';
      updateCharCount();
      clearResult();
      setStatus('', '');
    }

    function clearResult() {
      currentTranslation = null;
      lastSavedEntry = null;
      document.getElementById('deleteBtn').classList.remove('visible');
      setResult(null);
    }

    // ── Webhook ───────────────────────────────────────────────
    function saveWebhook() {
      const url = document.getElementById('webhookInput').value.trim();
      localStorage.setItem('srsWebhookUrl', url);
      setStatus('Webhook saved!', 'saved');
      setTimeout(() => setStatus('', ''), 2000);
    }

    // ── UI helpers ────────────────────────────────────────────
    function setStatus(msg, type) {
      const el = document.getElementById('statusBadge');
      el.textContent = msg;
      el.className = 'status-badge' + (msg ? ' show ' + type : '');
    }

    function setResult(text) {
      const el = document.getElementById('resultContent');
      const speakBtn = document.getElementById('speakBtn');
      if (text) {
        el.textContent = text;
        el.className = 'result-text';
        speakBtn.classList.add('visible');
      } else {
        el.textContent = 'Translation appears here';
        el.className = 'result-placeholder';
        speakBtn.classList.remove('visible');
        window.speechSynthesis && window.speechSynthesis.cancel();
      }
    }

    // ── Text-to-Speech ────────────────────────────────────────
    // Maps our language codes to BCP-47 locale codes for best voice matching
    const TTS_LOCALE = {
      es: 'es-ES',   // Spanish (Spain) — also works for Latin American
      da: 'da-DK',   // Danish
      ru: 'ru-RU',   // Russian
      en: 'en-US',
    };

    function speakResult() {
      if (!currentTranslation) return;
      const cfg   = langConfig[currentLang];
      const toCode = directionEnglishFirst ? cfg.code : 'en';
      const locale = TTS_LOCALE[toCode] || toCode;
      speak(currentTranslation, locale);
    }

    function speak(text, locale) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel(); // stop any ongoing speech

      const btn = document.getElementById('speakBtn');
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = locale;

      // Try to find a native voice for the locale
      const voices = window.speechSynthesis.getVoices();
      const exactVoice = voices.find(v => v.lang === locale);
      const partialVoice = voices.find(v => v.lang.startsWith(locale.split('-')[0]));
      if (exactVoice) utter.voice = exactVoice;
      else if (partialVoice) utter.voice = partialVoice;

      // Danish: slow down a little for clarity
      if (locale.startsWith('da')) utter.rate = 0.85;
      else utter.rate = 0.95;

      utter.onstart = () => btn && btn.classList.add('speaking');
      utter.onend = utter.onerror = () => btn && btn.classList.remove('speaking');

      window.speechSynthesis.speak(utter);
    }

    // ── History ───────────────────────────────────────────────
    function renderHistory() {
      const list = document.getElementById('historyList');
      if (!txHistory.length) {
        list.innerHTML = '<div class="empty-history">No translations yet</div>';
        return;
      }
      list.innerHTML = txHistory.slice(0, 8).map((item, i) => `
        <div class="history-item" onclick="reuseHistory(${i})">
          <div class="history-original">${esc(item.original)}</div>
          <div class="history-translated">${esc(item.translated)}</div>
          <div class="history-meta">
            <span class="lang-tag">${item.langName}</span>
            ${item.time}
          </div>
        </div>
      `).join('');
    }

    function reuseHistory(i) {
      const item = txHistory[i];
      document.getElementById('inputText').value = item.original;
      updateCharCount();
      // Match language
      const match = Object.keys(langConfig).find(k => langConfig[k].name === item.langName);
      if (match) selectLang(match);
      directionEnglishFirst = item.dirEnFirst !== false;
      localStorage.setItem('directionEnglishFirst', directionEnglishFirst);
      updateUI();
      clearResult();
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
